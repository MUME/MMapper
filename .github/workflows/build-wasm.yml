name: build-wasm

on:
  push:
    tags:
      - 'v*'
      - 'beta'
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set Git info
        id: info
        run: |
          RAW_TAG="${{ github.ref_name }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=$RAW_TAG
            VERSION_CLEAN=$(echo $VERSION | sed 's/^v//')
            # Check if this is NOT a beta tag to decide on 'latest'
            if [[ "$RAW_TAG" != "beta" ]]; then
               echo "PUSH_LATEST=true" >> $GITHUB_OUTPUT
            fi
          else
            VERSION=${{ github.sha }}
            VERSION_CLEAN=${VERSION:0:7}
          fi
          echo "VERSION=${VERSION_CLEAN}" >> $GITHUB_OUTPUT
          echo "RAW_TAG=${VERSION}" >> $GITHUB_OUTPUT
          echo "FILE=mmapper-${VERSION_CLEAN}-wasm.zip" >> $GITHUB_OUTPUT
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Local Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/${{ steps.info.outputs.REPO_LC }}:temp-build

      - name: Extract Artifacts from Image
        run: |
          docker create --name extract ghcr.io/${{ steps.info.outputs.REPO_LC }}:temp-build
          mkdir -p demo
          docker cp extract:/usr/share/nginx/html/. ./demo/
          docker rm extract
          zip -r ${{ steps.info.outputs.FILE }} demo

      - name: Upload Zip Package
        uses: actions/upload-artifact@v4
        with:
          name: mmapper-${{ steps.info.outputs.VERSION }}-wasm
          path: ${{ steps.info.outputs.FILE }}

      - name: Finalize Image Push to GHCR
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.info.outputs.REPO_LC }}:${{ steps.info.outputs.RAW_TAG }}
            ${{ steps.info.outputs.PUSH_LATEST == 'true' && format('ghcr.io/{0}:latest', steps.info.outputs.REPO_LC) || '' }}